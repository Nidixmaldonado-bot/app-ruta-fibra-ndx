<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chequeo de Ruta FO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([28.6353,-106.0889],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var rutaFibra = [
[28.70865981443147,-106.1333235805935],
[28.70911247679599,-106.133186708387],
[28.70958002817703,-106.1330238000702],
[28.71005127870847,-106.1328699640076],
[28.70954559268001,-106.1323622485121],
[28.70914014252386,-106.1319723823016],
[28.70906152305963,-106.1318928847314],
[28.70835601078123,-106.132122678503],
[28.70780009555819,-106.1323215820549],
[28.70725575831876,-106.1324816081106],
[28.70731979547426,-106.1325903874534],
[28.70743664541526,-106.132710127831]
];

var lineaRuta = L.polyline(rutaFibra,{
color:'red',
weight:4
}).addTo(map);

var recorrido = [];

var lineaRecorrido = L.polyline(recorrido,{
color:'green',
weight:5
}).addTo(map);

navigator.geolocation.watchPosition(function(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

var punto = [lat,lon];

recorrido.push(punto);

lineaRecorrido.setLatLngs(recorrido);

L.marker(punto).addTo(map);

});

</script>

</body>

</html>
